name: bridge-ci

on:
  push:
    branches: [main]
    paths:
      - "cadenza-bridge/**"
      - ".github/workflows/bridge-ci.yml"
  pull_request:
    paths:
      - "cadenza-bridge/**"
      - ".github/workflows/bridge-ci.yml"

jobs:
  build:
    name: build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cadenza-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cadenza-bridge/target
          key: bridge-${{ runner.os }}-${{ hashFiles('cadenza-bridge/**/Cargo.toml') }}
          restore-keys: |
            bridge-${{ runner.os }}-

      - name: cargo build
        run: cargo build --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test -- --nocapture
