name: bridge-ci

on:
  push:
    branches: [main]
    paths:
      - "cadenza-bridge/**"
      - ".github/workflows/bridge-ci.yml"
  pull_request:
    paths:
      - "cadenza-bridge/**"
      - ".github/workflows/bridge-ci.yml"
  # The e2e job is expensive (build rust bridge + .NET backend + playwright
  # chromium) so it is manually triggered via workflow_dispatch for now.
  # Promote to `push`/`pull_request` once the full stack is stable in CI.
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cadenza-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cadenza-bridge/target
          key: bridge-${{ runner.os }}-${{ hashFiles('cadenza-bridge/**/Cargo.toml') }}
          restore-keys: |
            bridge-${{ runner.os }}-

      - name: cargo build
        run: cargo build --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test -- --nocapture

  e2e:
    name: full-stack e2e (manual)
    # Keep this out of the auto-run set until the full stack is stable in
    # CI. Trigger from the Actions tab when you want regression coverage.
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cadenza-bridge/target
          key: bridge-e2e-${{ runner.os }}-${{ hashFiles('cadenza-bridge/**/Cargo.toml') }}
          restore-keys: |
            bridge-e2e-${{ runner.os }}-

      - name: Build bridge (headless)
        working-directory: cadenza-bridge
        run: cargo build --bin cadenza-bridge

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore backend
        working-directory: tamekoma-night/backend/src/TamekomaNight.Api
        run: dotnet restore

      - name: Build backend
        working-directory: tamekoma-night/backend/src/TamekomaNight.Api
        run: dotnet build --no-restore

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tamekoma-night/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: tamekoma-night/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tamekoma-night/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: tamekoma-night/frontend
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: tamekoma-night/frontend/e2e/screenshots
          if-no-files-found: warn

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tamekoma-night/frontend/playwright-report
          if-no-files-found: ignore
