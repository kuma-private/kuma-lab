name: bridge-release

on:
  push:
    tags:
      - 'bridge-v*'
  workflow_dispatch:
    inputs:
      version:
        description: "BRIDGE_VERSION override (optional)"
        required: false
        default: ""

jobs:
  build-mac:
    name: build macOS dmg
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cadenza-bridge/target
          key: bridge-release-mac-${{ hashFiles('cadenza-bridge/**/Cargo.toml') }}
          restore-keys: |
            bridge-release-mac-

      - name: Build universal .app + .dmg
        working-directory: cadenza-bridge
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          BRIDGE_VERSION: ${{ github.event.inputs.version }}
        run: ./packaging/mac/build.sh

      - name: Notarize (if secrets present)
        if: ${{ secrets.APPLE_ID != '' }}
        working-directory: cadenza-bridge
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./packaging/mac/notarize.sh target/release-mac/Cadenza-Bridge-*.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Cadenza-Bridge-mac
          path: cadenza-bridge/target/release-mac/*.dmg
          if-no-files-found: error

  build-win:
    name: build Windows msi
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cadenza-bridge/target
          key: bridge-release-win-${{ hashFiles('cadenza-bridge/**/Cargo.toml') }}
          restore-keys: |
            bridge-release-win-

      - name: Build exes (and msi if WiX present)
        working-directory: cadenza-bridge
        shell: pwsh
        env:
          WINDOWS_CODESIGN_PFX: ${{ secrets.WINDOWS_CODESIGN_PFX }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          BRIDGE_VERSION: ${{ github.event.inputs.version }}
        run: ./packaging/win/build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: Cadenza-Bridge-win
          path: |
            cadenza-bridge/target/release-win/*.msi
            cadenza-bridge/target/release-win/*.zip
          if-no-files-found: error

  release:
    name: draft GitHub Release
    if: startsWith(github.ref, 'refs/tags/bridge-v')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Cadenza-Bridge-mac/*.dmg
            artifacts/Cadenza-Bridge-win/*.msi
            artifacts/Cadenza-Bridge-win/*.zip
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
