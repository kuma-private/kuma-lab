steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'backend/Dockerfile'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/doubutsu-quiz/app:$_IMAGE_TAG'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/doubutsu-quiz/app:latest'
      - '.'
images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/doubutsu-quiz/app:$_IMAGE_TAG'
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/doubutsu-quiz/app:latest'
substitutions:
  _IMAGE_TAG: latest
options:
  machineType: E2_HIGHCPU_8
timeout: 1200s
